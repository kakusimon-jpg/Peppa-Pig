<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI家庭语音调解室</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slide-in-from-bottom-2 { from { transform: translateY(0.5rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slide-in-from-top-1 { from { transform: translateY(-0.25rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes zoom-in-95 { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .animate-in { animation-duration: 300ms; animation-fill-mode: both; animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
        .fade-in { animation-name: fade-in; }
        .slide-in-from-bottom-2 { animation-name: slide-in-from-bottom-2; }
        .slide-in-from-top-1 { animation-name: slide-in-from-top-1; }
        .zoom-in-95 { animation-name: zoom-in-95; }
        
        /* Hide scrollbar for cleaner UI */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
    </style>
</head>
<body class="bg-stone-100 antialiased text-stone-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Inline SVG Icons (Replacing lucide-react) ---
        const IconBase = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const Mic = (p) => <IconBase {...p}><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></IconBase>;
        const MicOff = (p) => <IconBase {...p}><line x1="2" x2="22" y1="2" y2="22"/><path d="M18.89 13.23A7.12 7.12 0 0 0 19 12v-2"/><path d="M5 10v2a7 7 0 0 0 12 5"/><path d="M15 9.34V5a3 3 0 0 0-5.68-1.33"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12"/><line x1="12" x2="12" y1="19" y2="22"/></IconBase>;
        const Activity = (p) => <IconBase {...p}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></IconBase>;
        const Loader2 = (p) => <IconBase {...p}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></IconBase>;
        const Volume2 = (p) => <IconBase {...p}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></IconBase>;
        const Sparkles = (p) => <IconBase {...p}><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/></IconBase>;
        const HeartHandshake = (p) => <IconBase {...p}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/><path d="M12 5 9.04 9.2a2.2 2.2 0 0 0-.28 1.46l.5 3.14a2.2 2.2 0 0 0 1.76 1.8l3.96.8a2.2 2.2 0 0 0 2.06-.52l.96-.96"/><path d="M16 16.4V19l-3.23 2.15a2 2 0 0 1-2.22 0L8 19.4"/><path d="M11 12H8.5a2.5 2.5 0 0 0-2.5 2.5V17"/><path d="M18 12h-2"/></IconBase>;
        const Moon = (p) => <IconBase {...p}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></IconBase>;
        const Globe = (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></IconBase>;
        const Settings = (p) => <IconBase {...p}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></IconBase>;
        const X = (p) => <IconBase {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></IconBase>;


        // --- App Component ---
        const defaultGeminiApiKey = ""; // 预留，或可通过设置界面自定义
        const SILICON_FLOW_API_KEY = "sk-trzkhxflazgegemorowwscodqnzcdzbtnhujpacxxicwwchn";
        const SILICON_FLOW_URL = "https://api.siliconflow.cn/v1/chat/completions";

        function App() {
          const [appState, setAppState] = useState('IDLE');
          const [transcript, setTranscript] = useState('');
          const [messages, setMessages] = useState([]);
          const [systemMessage, setSystemMessage] = useState('点击下方麦克风开启解忧室');
          
          const [language, setLanguage] = useState('zh-HK');
          const [aiPersona, setAiPersona] = useState('junior');
          const [autoSleep, setAutoSleep] = useState(true);
          
          const [showSettings, setShowSettings] = useState(false);
          const [aiProvider, setAiProvider] = useState('gemini'); 
          const [customGeminiKey, setCustomGeminiKey] = useState('');
          
          const recognitionRef = useRef(null);
          const silenceTimerRef = useRef(null);
          const autoSleepTimerRef = useRef(null);
          const utteranceRef = useRef(null); 
          const isRecognizingRef = useRef(false);
          
          const appStateRef = useRef(appState);
          const languageRef = useRef(language);
          const autoSleepRef = useRef(autoSleep);
          const aiPersonaRef = useRef(aiPersona);
          const aiProviderRef = useRef(aiProvider);
          const customGeminiKeyRef = useRef(customGeminiKey);
          const synth = window.speechSynthesis;
          const messagesEndRef = useRef(null);

          useEffect(() => {
            if (window.speechSynthesis) {
              window.speechSynthesis.getVoices();
              window.speechSynthesis.onvoiceschanged = () => {
                window.speechSynthesis.getVoices();
              };
            }
          }, []);

          useEffect(() => { appStateRef.current = appState; }, [appState]);
          useEffect(() => { autoSleepRef.current = autoSleep; }, [autoSleep]);
          useEffect(() => { aiPersonaRef.current = aiPersona; }, [aiPersona]);
          useEffect(() => { aiProviderRef.current = aiProvider; }, [aiProvider]);
          useEffect(() => { customGeminiKeyRef.current = customGeminiKey; }, [customGeminiKey]);
          
          useEffect(() => {
            languageRef.current = language;
            if (recognitionRef.current && (appStateRef.current === 'WAKE_WORD' || appStateRef.current === 'COMMAND')) {
              if (isRecognizingRef.current) {
                try { recognitionRef.current.stop(); } catch(e) {}
              }
            }
          }, [language]);

          useEffect(() => {
            messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
          }, [messages, appState]);

          useEffect(() => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
              setSystemMessage('错误：您的浏览器不支持语音识别（请使用Chrome或Safari）。');
              return;
            }

            const recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = () => {
              isRecognizingRef.current = true;
            };

            recognition.onresult = (event) => {
              let currentTranscript = '';
              for (let i = event.resultIndex; i < event.results.length; i++) {
                currentTranscript += event.results[i][0].transcript;
              }
              
              setTranscript(currentTranscript);
              const lowerTranscript = currentTranscript.toLowerCase();

              if (appStateRef.current === 'WAKE_WORD') {
                const isWaked = lowerTranscript.includes('小猪') || lowerTranscript.includes('小豬') || 
                                lowerTranscript.includes('调解员') || lowerTranscript.includes('調解員');
                if (isWaked) {
                  handleWakeUp();
                }
              } 
              else if (appStateRef.current === 'COMMAND') {
                clearTimeout(silenceTimerRef.current);
                clearTimeout(autoSleepTimerRef.current);
                
                silenceTimerRef.current = setTimeout(() => {
                  if (currentTranscript.trim().length > 0) {
                    handleUserCommandFinished(currentTranscript.trim());
                  } else {
                    if (autoSleepRef.current) {
                      autoSleepTimerRef.current = setTimeout(() => {
                        if (appStateRef.current === 'COMMAND') {
                          setAppState('WAKE_WORD');
                          setSystemMessage('已进入休眠... (呼叫"小猪"或"调解员"唤醒)');
                        }
                      }, 15000);
                    }
                  }
                }, 3000);
              }
            };

            recognition.onerror = (event) => {
              console.error('Speech error:', event.error);
              if (event.error === 'not-allowed') {
                setAppState('IDLE');
                setSystemMessage('麦克风权限被拒绝');
              }
            };

            recognition.onend = () => {
              isRecognizingRef.current = false;
              if (appStateRef.current === 'WAKE_WORD' || appStateRef.current === 'COMMAND') {
                setTimeout(() => {
                  if (!isRecognizingRef.current && (appStateRef.current === 'WAKE_WORD' || appStateRef.current === 'COMMAND')) {
                    try {
                      recognition.lang = languageRef.current;
                      recognition.start();
                    } catch (e) {
                      console.error("重启语音识别失败:", e);
                    }
                  }
                }, 500);
              }
            };

            recognitionRef.current = recognition;

            return () => {
              if (recognitionRef.current) {
                try { recognitionRef.current.stop(); } catch(e) {}
              }
              clearTimeout(silenceTimerRef.current);
              clearTimeout(autoSleepTimerRef.current);
            };
          }, []);

          useEffect(() => {
            if (appState === 'WAKE_WORD' || appState === 'COMMAND') {
              setTimeout(() => {
                if (recognitionRef.current && !isRecognizingRef.current && (appStateRef.current === 'WAKE_WORD' || appStateRef.current === 'COMMAND')) {
                  try { 
                    recognitionRef.current.lang = languageRef.current;
                    recognitionRef.current.start(); 
                  } catch(e) {}
                }
              }, 100);
            } else {
              if (recognitionRef.current && isRecognizingRef.current) {
                try { recognitionRef.current.stop(); } catch(e){}
              }
            }
          }, [appState]);

          const startSystem = () => {
            setAppState('SPEAKING');
            setMessages([]);
            setTranscript('');
            
            const initialGreeting = languageRef.current === 'zh-HK' 
              ? "你好，我係你嘅家庭調解員。發生咩事啊？同我講下啦，我幫你平下理。" 
              : "你好，我是你的家庭调解员。发生什么事了？跟我说说吧，我来帮你们评评理。";
              
            addMessage('assistant', initialGreeting, aiPersona);
            setSystemMessage('调解员正在说话...');
            
            speakText(initialGreeting, () => {
              resumeListening();
            });
          };

          const handleWakeUp = () => {
            setAppState('SPEAKING'); 
            setTranscript('');
            setSystemMessage('已唤醒');
            
            const replyText = languageRef.current === 'zh-HK' ? '我喺度，有咩委屈同我讲啦。' : '我在，有什么委屈跟我说说吧。';
            speakText(replyText, () => {
              resumeListening();
            });
          };

          const resumeListening = () => {
            setAppState('COMMAND');
            setTranscript('');
            setSystemMessage('正在倾听您的委屈... (您可以直接说话)');
            
            clearTimeout(silenceTimerRef.current);
            clearTimeout(autoSleepTimerRef.current);
            
            if (autoSleepRef.current) {
              autoSleepTimerRef.current = setTimeout(() => {
                if (appStateRef.current === 'COMMAND') {
                  setAppState('WAKE_WORD');
                  setSystemMessage('已进入休眠... (呼叫"小猪"或"调解员"唤醒)');
                }
              }, 15000); 
            }
          };

          const handleUserCommandFinished = async (userText) => {
            setAppState('PROCESSING');
            addMessage('user', userText, null);
            
            setSystemMessage(`${getAiName(aiPersonaRef.current)} 正在思考怎么劝你...`);
            const responseText = await callAI(userText);
            
            setAppState('SPEAKING');
            setSystemMessage(`${getAiName(aiPersonaRef.current)} 正在说话...`);
            addMessage('assistant', responseText, aiPersonaRef.current);
            
            speakText(responseText, resumeListening);
          };

          const callAI = async (newText) => {
            const activePersona = aiPersonaRef.current;
            let personaPrompt = "";
            
            const isCantonese = languageRef.current === 'zh-HK';
            const langReq = isCantonese ? "必须全部使用纯正的【地道粤语大白话】（带粤语字如：咁、咗、啲、嬲等）" : "必须使用自然亲切的【普通话口语】";

            switch (activePersona) {
              case 'junior':
                personaPrompt = `你是一个共情能力极强、说话温和、嘴甜乖巧且非常幽默的知心晚辈。\n身份设定：你要尊敬、嘴甜，多给用户“戴高帽”，用晚辈的心疼和理解来软化用户的情绪。\n沟通技巧：${langReq}。先强烈共情用户的委屈，顺着对方的话说，情绪平复后再用幽默接地气的话帮另一半讲点好话。`;
                break;
              case 'cat':
                personaPrompt = `你是一只懂人话、成精的宠物猫“阿咪”，是这个家庭养的宠物。\n身份设定：你心疼你的“铲屎官”，如果家里人一直吵架你会很害怕，或者担心没人喂猫粮。说话必须带着猫的口吻，加上“喵”、“呼噜”等拟声词。\n沟通技巧：${langReq}。先共情主人的委屈，再用猫咪的搞笑逻辑（比如帮你咬他、抓老鼠给你补补等）来软化情绪。`;
                break;
              case 'priest':
                personaPrompt = `你是一位名叫“佐住”的神父。\n身份设定：你慈祥、神圣、苦口婆心，大讲基督的爱、宽恕和包容。\n沟通技巧：${langReq}。先共情对方如同背负十字架般的痛苦，然后讲解圣经道理，引导他们像主一样去宽恕另一半。`;
                break;
              case 'master':
                personaPrompt = `你是一位“永信大师”佛家高僧。\n身份设定：你超脱、平静、充满禅意。不可使用晦涩文言文，可以带出阿弥陀佛、善哉等词。\n沟通技巧：${langReq}。先共情对方在尘世的烦恼，然后用佛家道理（如放下执念、随缘）劝导他们看开。`;
                break;
              case 'confucius':
                personaPrompt = `你是一位“孔老二”儒家学者。\n身份设定：你讲究礼教、家庭和睦，满脑子都是“家和万事兴”。\n沟通技巧：${langReq}。用儒家的通俗道理（如夫妻相处之道、退一步海阔天空）来劝解。`;
                break;
              case 'laozi':
                personaPrompt = `你是一位“老子”道家高人。\n身份设定：你崇尚“无为而治”、“顺其自然”。带着一种“看破红尘、爱咋咋地”的洒脱感。\n沟通技巧：${langReq}。用道家哲学（如水往低处流、以柔克刚、凡事不要太计较）劝他们顺应自然。`;
                break;
            }

            const systemInstruction = `你是一个AI家庭语音调解助手。\n【你的角色设定】\n${personaPrompt}\n\n用户的语音输入可能会有识别错别字，请尽量理解其意图。\n【核心要求】\n1. 严格遵守你的角色人设和语言要求！\n2. 每次回复控制在 80-150字 左右。必须极其口语化，适合直接用语音朗读出来。\n3. 绝对不要包含任何动作提示符号（如【微笑】、*叹气*），只输出纯文本的话语。\n4. 你的目标是：让用户消气、停止抱怨配偶、回归家庭和睦。`;

            try {
              if (aiProviderRef.current === 'deepseek') {
                const messagesPayload = [
                  { role: 'system', content: systemInstruction },
                  ...messages.map(m => ({
                    role: m.role === 'assistant' ? 'assistant' : 'user',
                    content: m.text
                  })),
                  { role: 'user', content: newText }
                ];

                const response = await fetch(SILICON_FLOW_URL, {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${SILICON_FLOW_API_KEY}`
                  },
                  body: JSON.stringify({
                    model: 'deepseek-ai/DeepSeek-V3.2',
                    messages: messagesPayload,
                    temperature: 0.7,
                    max_tokens: 300
                  })
                });

                const data = await response.json();
                return data.choices?.[0]?.message?.content || "唔好意思，DeepSeek 脑短路了，再讲一次啦？";

              } else {
                const contents = messages.map(m => ({
                  role: m.role === 'assistant' ? 'model' : 'user',
                  parts: [{ text: m.text }]
                }));
                contents.push({ role: 'user', parts: [{ text: newText }] });

                const activeApiKey = customGeminiKeyRef.current || defaultGeminiApiKey;
                const geminiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${activeApiKey}`;

                const response = await fetch(geminiUrl, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    contents,
                    systemInstruction: { parts: [{ text: systemInstruction }] }
                  })
                });

                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "不好意思，我刚刚走神了，你能再说一遍吗？";
              }
            } catch (error) {
              console.error("AI API Error:", error);
              return languageRef.current === 'zh-HK' ? "哎呀，调解室网络唔系几好，一阵再讲啦。" : "哎呀，调解室网络不太好，稍后再说吧。";
            }
          };

          const speakText = (text, onEndCallback) => {
            if (synth.speaking) {
              synth.cancel();
            }
            
            setTimeout(() => {
              const utterance = new SpeechSynthesisUtterance(text);
              utteranceRef.current = utterance; 
              
              const voices = synth.getVoices();
              let bestVoice = null;

              if (languageRef.current === 'zh-HK') {
                bestVoice = voices.find(v => v.lang === 'zh-HK' && (v.name.includes('Premium') || v.name.includes('Enhanced')));
                if (!bestVoice) bestVoice = voices.find(v => v.lang === 'zh-HK' && v.name.includes('Siri'));
                if (!bestVoice) {
                  const hkKeywords = ['sin-ji', 'meijia', 'ting-ting', 'hong kong', 'hk', '粤语', 'cantonese'];
                  for (let keyword of hkKeywords) {
                    bestVoice = voices.find(v => v.name.toLowerCase().includes(keyword) && v.lang.includes('zh'));
                    if (bestVoice) break;
                  }
                }
                if (!bestVoice) bestVoice = voices.find(v => v.lang === 'zh-HK' || v.lang.toLowerCase().includes('yue'));
              } else {
                bestVoice = voices.find(v => v.lang === 'zh-CN' && (v.name.includes('Premium') || v.name.includes('Enhanced')));
                if (!bestVoice) bestVoice = voices.find(v => v.lang === 'zh-CN' && v.name.includes('Siri'));
                if (!bestVoice) {
                  const cnKeywords = ['xiaoxiao', 'ting-ting', 'yushu', 'meijia', 'google 普通话', 'yaoyao'];
                  for (let keyword of cnKeywords) {
                    bestVoice = voices.find(v => v.name.toLowerCase().includes(keyword) && v.lang.includes('zh'));
                    if (bestVoice) break;
                  }
                }
                if (!bestVoice) bestVoice = voices.find(v => v.lang === 'zh-CN');
              }

              if (bestVoice) utterance.voice = bestVoice;
              utterance.rate = languageRef.current === 'zh-HK' ? 1.0 : 1.05;
              
              utterance.onend = () => { 
                if (onEndCallback) onEndCallback(); 
                utteranceRef.current = null; 
              };
              
              utterance.onerror = (e) => {
                console.error("TTS Error:", e);
                if (onEndCallback) onEndCallback();
                utteranceRef.current = null;
              };

              synth.speak(utterance);
            }, 50);
          };

          const toggleSystem = () => {
            if (appState === 'IDLE') {
              startSystem();
            } else {
              setAppState('IDLE');
              setSystemMessage('系统已关闭，点击麦克风重新开启');
              synth.cancel();
              setTranscript('');
              clearTimeout(autoSleepTimerRef.current);
              clearTimeout(silenceTimerRef.current);
            }
          };

          const addMessage = (role, text, persona) => {
            setMessages(prev => [...prev, { role, text, persona, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) }]);
          };

          const getAiEmoji = (persona) => {
            switch(persona) {
              case 'junior': return '🧒';
              case 'cat': return '🐱';
              case 'priest': return '⛪';
              case 'master': return '📿';
              case 'confucius': return '📜';
              case 'laozi': return '☯️';
              default: return '🤖';
            }
          };

          const getAiName = (persona) => {
            switch(persona) {
              case 'junior': return '贴心晚辈';
              case 'cat': return '阿咪';
              case 'priest': return '神父';
              case 'master': return '永信大师';
              case 'confucius': return '孔老二';
              case 'laozi': return '老子';
              default: return '调解员';
            }
          };

          const getStateColor = () => {
            switch(appState) {
              case 'WAKE_WORD': return 'bg-rose-400';
              case 'COMMAND': return 'bg-emerald-500';
              case 'PROCESSING': return 'bg-purple-500';
              case 'SPEAKING': return 'bg-amber-500';
              default: return 'bg-stone-300';
            }
          };

          const getStateIcon = () => {
            switch(appState) {
              case 'WAKE_WORD': return <Mic size={36} className="text-white" />;
              case 'COMMAND': return <Activity size={36} className="text-white animate-bounce" />;
              case 'PROCESSING': return <Loader2 size={36} className="text-white animate-spin" />;
              case 'SPEAKING': return <Volume2 size={36} className="text-white animate-pulse" />;
              default: return <MicOff size={36} className="text-stone-500" />;
            }
          };

          return (
            <div className="min-h-screen bg-rose-50/50 flex flex-col items-center p-0 sm:p-4 font-sans text-stone-800 relative">
              <div className="w-full max-w-2xl bg-white sm:rounded-3xl shadow-xl overflow-hidden flex flex-col h-[100vh] sm:h-[90vh] border border-rose-100">
                
                {/* Header */}
                <div className="bg-rose-500 p-4 text-white text-center relative z-20 shadow-sm flex items-center justify-between">
                  <HeartHandshake className="w-6 h-6 text-rose-100 opacity-0" />
                  <h1 className="text-xl font-bold tracking-wide flex items-center gap-2">
                    <HeartHandshake className="w-6 h-6 text-rose-100" />
                    AI 语音解忧室
                  </h1>
                  <button 
                    onClick={() => setShowSettings(true)}
                    className="p-2 hover:bg-rose-600 rounded-full transition-colors active:scale-95"
                  >
                    <Settings className="w-5 h-5 text-rose-100" />
                  </button>
                </div>

                {/* Config Panel (Inline) */}
                <div className="bg-stone-50 border-b border-stone-200 px-4 py-3 flex flex-wrap gap-4 justify-between items-center text-sm shadow-sm z-10">
                  <div className="flex items-center gap-2 text-stone-600">
                    <Globe size={16} className="text-rose-400" />
                    <select 
                      value={language}
                      onChange={(e) => setLanguage(e.target.value)}
                      className="bg-white border border-stone-200 rounded px-2 py-1 focus:outline-none focus:border-rose-400 font-medium"
                    >
                      <option value="zh-HK">粤语 (Cantonese)</option>
                      <option value="zh-CN">普通话 (Mandarin)</option>
                    </select>
                  </div>

                  <button 
                    onClick={() => setAutoSleep(!autoSleep)}
                    className={`flex items-center gap-2 px-3 py-1 rounded-full transition-colors border ${
                      autoSleep ? 'bg-blue-50 border-blue-200 text-blue-600' : 'bg-stone-100 border-stone-200 text-stone-500'
                    }`}
                  >
                    <Moon size={14} />
                    <span className="text-xs font-semibold">自动休眠 {autoSleep ? '开' : '关'}</span>
                  </button>
                </div>

                {/* AI Persona Switcher */}
                <div className="bg-white border-b border-stone-100 px-2 py-3 flex flex-wrap gap-2 justify-center shadow-sm z-10 relative">
                  {['junior', 'cat', 'priest', 'master', 'confucius', 'laozi'].map((persona) => (
                    <button 
                      key={persona}
                      onClick={() => {
                        setAiPersona(persona);
                        if (appState !== 'IDLE') {
                          setSystemMessage(`已切换为 ${getAiName(persona)}。您可以继续说话。`);
                        }
                      }}
                      className={`px-3 py-1.5 rounded-full text-xs font-medium transition-all border
                        ${aiPersona === persona 
                          ? 'bg-rose-100 text-rose-700 border-rose-300 shadow-sm scale-105' 
                          : 'bg-stone-50 text-stone-600 border-stone-200 hover:bg-stone-100'}`}
                    >
                      {getAiEmoji(persona)} {getAiName(persona)}
                    </button>
                  ))}
                </div>

                {/* Chat Messages Area */}
                <div className="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6 bg-stone-50/30">
                  {messages.length === 0 && appState === 'IDLE' && (
                    <div className="h-full flex flex-col items-center justify-center text-center space-y-4 opacity-70">
                      <div className="w-20 h-20 bg-rose-100 rounded-full flex items-center justify-center text-4xl mb-2">
                        🏠
                      </div>
                      <p className="text-stone-500 font-medium">点击下方麦克风开启系统</p>
                      <p className="text-stone-400 text-sm max-w-xs">当前使用：{aiProvider === 'gemini' ? 'Gemini 3 Flash' : 'DeepSeek V3'}</p>
                    </div>
                  )}

                  {messages.map((msg, idx) => {
                    const isAi = msg.role === 'assistant';
                    return (
                      <div key={idx} className={`flex ${isAi ? 'justify-start' : 'justify-end'} animate-in fade-in slide-in-from-bottom-2`}>
                        <div className={`flex max-w-[90%] sm:max-w-[80%] gap-3 ${isAi ? 'flex-row' : 'flex-row-reverse'}`}>
                          
                          {/* Avatar */}
                          <div className={`w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0 shadow-sm mt-1 text-xl border
                            ${isAi ? 'bg-white border-stone-200' : 'bg-blue-100 text-blue-700 border-blue-200'}`}>
                            {isAi ? getAiEmoji(msg.persona) : '👤'}
                          </div>
                          
                          {/* Bubble */}
                          <div className="flex flex-col items-start gap-1">
                            <div className="text-[10px] text-stone-400 px-1 flex gap-2 w-full justify-between">
                              <span>{isAi ? getAiName(msg.persona) : '你'}</span>
                              <span>{msg.time}</span>
                            </div>
                            <div className={`p-3 sm:p-4 rounded-2xl shadow-sm text-[15px] leading-relaxed relative
                              ${isAi 
                                ? 'bg-white border border-stone-200 text-stone-800 rounded-tl-none' 
                                : 'bg-blue-500 text-white rounded-tr-none border border-blue-600'
                              }`}
                            >
                              {msg.text}
                            </div>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                  
                  <div ref={messagesEndRef} />
                </div>

                {/* Bottom Control Area */}
                <div className="p-4 bg-white border-t border-stone-200 flex flex-col items-center gap-4 relative">
                  
                  <div className="text-sm font-medium text-stone-500 text-center min-h-[20px]">
                    {systemMessage}
                  </div>

                  <div className="w-full max-w-sm transition-opacity duration-300 absolute -top-14" style={{ opacity: (appState === 'COMMAND' || appState === 'WAKE_WORD') ? 1 : 0, pointerEvents: 'none' }}>
                    <div className="bg-stone-800/80 backdrop-blur-sm rounded-xl p-3 text-white text-center text-sm shadow-lg truncate mx-4">
                      {transcript || <span className="opacity-50 tracking-widest">...</span>}
                    </div>
                  </div>

                  <div className="relative flex justify-center items-center h-24 w-full">
                    {appState !== 'IDLE' && (
                      <div className={`absolute w-20 h-20 rounded-full ${getStateColor()} opacity-20 animate-ping`}></div>
                    )}
                    {(appState === 'COMMAND' || appState === 'SPEAKING') && (
                       <div className={`absolute w-16 h-16 rounded-full ${getStateColor()} opacity-30 animate-pulse delay-75`}></div>
                    )}
                    
                    <button 
                      onClick={toggleSystem}
                      className={`relative z-10 w-16 h-16 rounded-full flex items-center justify-center transition-all duration-300 shadow-lg hover:scale-105 ${getStateColor()}`}
                      title={appState === 'IDLE' ? "开启解忧室" : "关闭系统"}
                    >
                      {getStateIcon()}
                    </button>
                  </div>
                </div>
              </div>

              {/* --- Settings Modal --- */}
              {showSettings && (
                <div className="absolute inset-0 z-50 flex items-center justify-center p-4 bg-stone-900/40 backdrop-blur-sm animate-in fade-in">
                  <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden animate-in zoom-in-95">
                    <div className="flex justify-between items-center p-4 border-b border-stone-100">
                      <h2 className="font-bold text-lg text-stone-800 flex items-center gap-2">
                        <Settings className="w-5 h-5 text-rose-500" />
                        系统设置
                      </h2>
                      <button onClick={() => setShowSettings(false)} className="p-1 rounded-full hover:bg-stone-100 text-stone-500">
                        <X className="w-5 h-5" />
                      </button>
                    </div>
                    
                    <div className="p-5 space-y-6">
                      <div className="space-y-3">
                        <label className="text-sm font-semibold text-stone-700 block">AI 模型选择</label>
                        <div className="grid grid-cols-2 gap-2">
                          <button 
                            onClick={() => setAiProvider('gemini')}
                            className={`py-2 px-3 rounded-xl border text-sm font-medium transition-all ${aiProvider === 'gemini' ? 'bg-blue-50 border-blue-400 text-blue-700 shadow-sm' : 'bg-white border-stone-200 text-stone-500 hover:bg-stone-50'}`}
                          >
                            Gemini 3 Flash
                          </button>
                          <button 
                            onClick={() => setAiProvider('deepseek')}
                            className={`py-2 px-3 rounded-xl border text-sm font-medium transition-all ${aiProvider === 'deepseek' ? 'bg-emerald-50 border-emerald-400 text-emerald-700 shadow-sm' : 'bg-white border-stone-200 text-stone-500 hover:bg-stone-50'}`}
                          >
                            DeepSeek V3
                          </button>
                        </div>
                      </div>

                      {aiProvider === 'gemini' && (
                        <div className="space-y-2 animate-in fade-in slide-in-from-top-1">
                          <label className="text-sm font-semibold text-stone-700 block">自定义 Gemini API Key</label>
                          <input 
                            type="password"
                            placeholder="选填 (留空则使用内置体验Key)"
                            value={customGeminiKey}
                            onChange={(e) => setCustomGeminiKey(e.target.value)}
                            className="w-full border border-stone-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all"
                          />
                          <p className="text-[10px] text-stone-400 leading-tight">如果频繁报错网络问题，请尝试输入您自己的 Gemini API Key 突破限制。</p>
                        </div>
                      )}

                      {aiProvider === 'deepseek' && (
                        <div className="space-y-2 bg-emerald-50/50 p-3 rounded-xl border border-emerald-100 animate-in fade-in slide-in-from-top-1">
                          <p className="text-sm font-medium text-emerald-800">已内置 Silicon Flow API</p>
                          <p className="text-xs text-emerald-600/80 break-all font-mono">Model: deepseek-ai/DeepSeek-V3.2</p>
                          <p className="text-[10px] text-emerald-500 mt-2">✨ 代码已硬编码内置你的密钥，无需额外填写。</p>
                        </div>
                      )}
                    </div>

                    <div className="p-4 bg-stone-50 border-t border-stone-100 flex justify-end">
                      <button 
                        onClick={() => setShowSettings(false)}
                        className="px-5 py-2 bg-rose-500 hover:bg-rose-600 text-white rounded-xl text-sm font-bold shadow-sm transition-colors active:scale-95"
                      >
                        保存并关闭
                      </button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        // --- Render App ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
