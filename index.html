        const ShinchanAvatar = ({ isSpeaking, isPlayingSong }) => (
          <svg viewBox="0 0 200 200" className="w-32 h-32 sm:w-40 sm:h-40 drop-shadow-xl transition-transform duration-300">

            <path d="M 50 70 Q 70 50 90 70" fill="none" stroke="#333" strokeWidth="8" strokeLinecap="round">
               {isPlayingSong && <animate attributeName="d" values="M 50 70 Q 70 50 90 70; M 50 65 Q 70 45 90 65; M 50 70 Q 70 50 90 70" dur="1.5s" repeatCount="indefinite" />}
            </path>
            <path d="M 110 70 Q 130 50 150 70" fill="none" stroke="#333" strokeWidth="8" strokeLinecap="round">
               {isPlayingSong && <animate attributeName="d" values="M 110 70 Q 130 50 150 70; M 110 65 Q 130 45 150 65; M 110 70 Q 130 50 150 70" dur="1.5s" repeatCount="indefinite" />}
            </path>
            {isPlayingSong ? (
               <>
                 <path d="M 60 90 Q 70 80 80 90" fill="none" stroke="#333" strokeWidth="3" strokeLinecap="round"/>
                 <path d="M 120 90 Q 130 80 140 90" fill="none" stroke="#333" strokeWidth="3" strokeLinecap="round"/>
               </>
            ) : (
               <>
                 <circle cx="70" cy="90" r="10" fill="#fff" stroke="#333" strokeWidth="2"/> <circle cx="70" cy="90" r="5" fill="#333"/>
                 <circle cx="130" cy="90" r="10" fill="#fff" stroke="#333" strokeWidth="2"/> <circle cx="130" cy="90" r="5" fill="#333"/>
               </>
            )}
            <ellipse cx="50" cy="120" rx="15" ry="10" fill="#ff9999" opacity="0.6"/>
            <ellipse cx="150" cy="120" rx="15" ry="10" fill="#ff9999" opacity="0.6"/>
            {isSpeaking ? (
              <circle cx="100" cy="140" r="15" fill="#cc3333" stroke="#333" strokeWidth="2">
                 <animate attributeName="r" values="15; 5; 15" dur="0.3s" repeatCount="indefinite" />
              </circle>
            ) : isPlayingSong ? (
              <circle cx="100" cy="140" r="12" fill="#cc3333" stroke="#333" strokeWidth="2">
                 <animate attributeName="r" values="12; 6; 12" dur="0.8s" repeatCount="indefinite" />
              </circle>
            ) : (
              <path d="M 95 140 Q 100 145 105 140" fill="none" stroke="#333" strokeWidth="3" strokeLinecap="round"/>

          </svg>
        );

        const AVATAR_OPTIONS = [
          { id: 'doraemon', name: '多啦A梦', component: DoraemonAvatar },
          { id: 'peppapig', name: '小猪佩奇', component: PeppaPigAvatar },
          { id: 'ninjaturtle', name: '忍者神龟', component: NinjaTurtleAvatar },
          { id: 'popeye', name: '大力水手', component: PopeyeAvatar },
          { id: 'huluwa', name: '葫芦娃', component: HuluwaAvatar },
          { id: 'donald', name: '唐老鸭', component: DonaldAvatar },
          { id: 'shinchan', name: '蜡笔小新', component: ShinchanAvatar },
          { id: 'pikachu', name: '皮卡丘', component: PikachuAvatar },
        ];

        // =======================
        // --- 主应用组件 ---
        // =======================

        function App() {
          const [appState, setAppState] = useState('IDLE'); // IDLE, WAKE_WORD, COMMAND, PROCESSING, SPEAKING, PLAYING_SONG
          const [transcript, setTranscript] = useState('');
          const [messages, setMessages] = useState([]);
          const [systemMessage, setSystemMessage] = useState('点击下方麦克风开启解忧室');
          
          const [language, setLanguage] = useState('zh-HK');
          const [aiPersona, setAiPersona] = useState('junior');
          const [activeAvatarId, setActiveAvatarId] = useState('doraemon'); 
          const [autoSleep, setAutoSleep] = useState(true);
          
          const [showSettings, setShowSettings] = useState(false);
          const [aiProvider, setAiProvider] = useState('gemini'); 
          const [customGeminiKey, setCustomGeminiKey] = useState('');
          
          const [currentSong, setCurrentSong] = useState(null);
          const [inputText, setInputText] = useState(''); 
          const [isSpeechSupported, setIsSpeechSupported] = useState(true); 
          
          const recognitionRef = useRef(null);
          const silenceTimerRef = useRef(null);
          const autoSleepTimerRef = useRef(null);
          const utteranceRef = useRef(null); 
          const audioRef = useRef(null);
          const isRecognizingRef = useRef(false);

          // 拖拽滚动相关的 Ref
          const avatarScrollRef = useRef(null);
          const dragRef = useRef({ isDragging: false, startX: 0, scrollLeft: 0, dragDistance: 0 });
          
          const appStateRef = useRef(appState);
          const languageRef = useRef(language);
          const autoSleepRef = useRef(autoSleep);
          const aiPersonaRef = useRef(aiPersona);
          const activeAvatarIdRef = useRef(activeAvatarId);
          const aiProviderRef = useRef(aiProvider);
          const customGeminiKeyRef = useRef(customGeminiKey);
          const synth = window.speechSynthesis;
          const messagesEndRef = useRef(null);

          // 新增：安全激活 Audio Context 的助手方法（应对 iOS 浏览器限制）
          const initAudioContext = () => {
            if (audioRef.current && !audioRef.current.dataset.unlocked) {
              audioRef.current.dataset.unlocked = "true";
              audioRef.current.volume = 0; // 短暂静音避免噪音
              audioRef.current.play().then(() => {
                audioRef.current.pause();
                audioRef.current.volume = 1;
              }).catch((e) => {
                console.warn("Audio pre-unlock failed:", e);
                audioRef.current.volume = 1;
              });
            }
          };

          useEffect(() => {
            if (window.speechSynthesis) {
              window.speechSynthesis.getVoices();
              window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
            }
          }, []);

          useEffect(() => { appStateRef.current = appState; }, [appState]);
          useEffect(() => { autoSleepRef.current = autoSleep; }, [autoSleep]);
          useEffect(() => { aiPersonaRef.current = aiPersona; }, [aiPersona]);
          useEffect(() => { activeAvatarIdRef.current = activeAvatarId; }, [activeAvatarId]);
          useEffect(() => { aiProviderRef.current = aiProvider; }, [aiProvider]);
          useEffect(() => { customGeminiKeyRef.current = customGeminiKey; }, [customGeminiKey]);
          
          useEffect(() => {
            languageRef.current = language;
            if (recognitionRef.current && (appStateRef.current === 'WAKE_WORD' || appStateRef.current === 'COMMAND')) {
              if (isRecognizingRef.current) {
                try { recognitionRef.current.stop(); } catch(e) {}
              }
            }
          }, [language]);

          useEffect(() => {
            messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
          }, [messages, appState]);

          useEffect(() => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
              setIsSpeechSupported(false);
              setSystemMessage('当前环境不支持语音唤醒（iOS App受限），请直接打字。');
              return;
            }

            const recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = () => { isRecognizingRef.current = true; };

            recognition.onresult = (event) => {
              let currentTranscript = '';
              for (let i = event.resultIndex; i < event.results.length; i++) {
                currentTranscript += event.results[i][0].transcript;
              }
              
              setTranscript(currentTranscript);
              const lowerTranscript = currentTranscript.toLowerCase();

              if (appStateRef.current === 'WAKE_WORD') {
                const isWaked = lowerTranscript.includes('小猪') || lowerTranscript.includes('小豬') || 
                                lowerTranscript.includes('调解员') || lowerTranscript.includes('調解員');
                if (isWaked) handleWakeUp();
              } 
              else if (appStateRef.current === 'COMMAND') {
                clearTimeout(silenceTimerRef.current);
                clearTimeout(autoSleepTimerRef.current);
                
                silenceTimerRef.current = setTimeout(() => {
                  if (currentTranscript.trim().length > 0) {
                    handleUserCommandFinished(currentTranscript.trim());
                  } else {
                    if (autoSleepRef.current) {
                      autoSleepTimerRef.current = setTimeout(() => {
                        if (appStateRef.current === 'COMMAND') {
                          setAppState('WAKE_WORD');
                          setSystemMessage('已进入休眠... (呼叫"小猪"或"调解员"唤醒)');
                        }
                      }, 15000);
                    }
                  }
                }, 3000);
              }
            };

            recognition.onerror = (event) => {
              if (event.error === 'not-allowed') {
                setAppState('IDLE');
                setSystemMessage('麦克风权限被拒绝');
              }
            };

            recognition.onend = () => {
              isRecognizingRef.current = false;
              if (appStateRef.current === 'WAKE_WORD' || appStateRef.current === 'COMMAND') {
                setTimeout(() => {
                  if (!isRecognizingRef.current && (appStateRef.current === 'WAKE_WORD' || appStateRef.current === 'COMMAND')) {
                    try { recognition.lang = languageRef.current; recognition.start(); } catch (e) {}
                  }
                }, 500);
              }
            };

            recognitionRef.current = recognition;

            return () => {
              if (recognitionRef.current) {
                try { recognitionRef.current.stop(); } catch(e) {}
              }
              clearTimeout(silenceTimerRef.current);
              clearTimeout(autoSleepTimerRef.current);
            };
          }, []);

          useEffect(() => {
            if (appState === 'WAKE_WORD' || appState === 'COMMAND') {
              setTimeout(() => {
                if (recognitionRef.current && !isRecognizingRef.current && (appStateRef.current === 'WAKE_WORD' || appStateRef.current === 'COMMAND')) {
                  try { recognitionRef.current.lang = languageRef.current; recognitionRef.current.start(); } catch(e) {}
                }
              }, 100);
            } else {
              if (recognitionRef.current && isRecognizingRef.current) {
                try { recognitionRef.current.stop(); } catch(e){}
              }
            }
          }, [appState]);

          const startSystem = () => {
            setAppState('SPEAKING');
            setMessages([]);
            setTranscript('');
            setCurrentSong(null);
            
            const currentAvatar = AVATAR_OPTIONS.find(a => a.id === activeAvatarIdRef.current) || AVATAR_OPTIONS[0];
            const initialGreeting = languageRef.current === 'zh-HK' 
              ? `你好，我係你嘅家庭調解員${currentAvatar.name}！發生咩事啊？同我講下啦，我幫你平下理。` 
              : `你好，我是你的家庭调解员${currentAvatar.name}！发生什么事了？跟我说说吧，我来帮你们评评理。`;
              
            addMessage('assistant', initialGreeting, aiPersona);
            setSystemMessage('调解员正在说话...');
            
            speakText(initialGreeting, resumeListening);
          };

          const handleWakeUp = () => {
            setAppState('SPEAKING'); 
            setTranscript('');
            setSystemMessage('已唤醒');
            
            const replyText = languageRef.current === 'zh-HK' ? '我喺度，有咩委屈同我讲啦。' : '我在，有什么委屈跟我说说吧。';
            speakText(replyText, resumeListening);
          };

          const resumeListening = () => {
            setAppState('COMMAND');
            setTranscript('');
            setSystemMessage(isSpeechSupported ? '正在倾听您的委屈... (可直接说话或打字)' : '请在下方输入框打字...');
            
            clearTimeout(silenceTimerRef.current);
            clearTimeout(autoSleepTimerRef.current);
            
            if (autoSleepRef.current) {
              autoSleepTimerRef.current = setTimeout(() => {
                if (appStateRef.current === 'COMMAND') {
                  setAppState('WAKE_WORD');
                  setSystemMessage('已进入休眠... (呼叫"小猪"或"调解员"唤醒)');
                }
              }, 15000); 
            }
          };

          const playSong = async (query) => {
            setAppState('PROCESSING');
            setSystemMessage(`正在搜索歌曲: ${query}...`);
            try {
              // 增加搜索限制，防止第一首没版权
              const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&limit=5`);
              const data = await res.json();
              
              // 必须找到一个带有真实试听链接的音轨
              const track = data.results && data.results.find(t => t.previewUrl);
              
              if (track) {
                const songData = {
                  title: track.trackName,
                  artist: track.artistName,
                  cover: track.artworkUrl100,
                  url: track.previewUrl
                };
                
                setCurrentSong(songData);
                setAppState('PLAYING_SONG');
                setSystemMessage(`正在播放: ${songData.title} - ${songData.artist} (30s)`);
                
                if (audioRef.current) {
                  audioRef.current.src = songData.url;
                  // 捕捉被浏览器（如iOS Safari）拦截自动播放的异常
                  audioRef.current.play().catch(err => {
                    console.error("Audio playback restricted by browser:", err);
                    setAppState('SPEAKING');
                    const failMsg = languageRef.current === 'zh-HK' ? "哎呀，瀏覽器限制咗自動播放，放唔到歌呀。" : "哎呀，浏览器限制了自动播放，无法为您放歌。";
                    addMessage('assistant', failMsg, aiPersonaRef.current);
                    speakText(failMsg, resumeListening);
                  });
                }
              } else {
                setAppState('SPEAKING');
                const failMsg = languageRef.current === 'zh-HK' ? "哎呀，揾唔到呢首歌嘅试听喎，不如换一首？" : "哎呀，没找到这首歌的试听片段呢，不如换一首？";
                addMessage('assistant', failMsg, aiPersonaRef.current);
                speakText(failMsg, resumeListening);
              }
            } catch (e) {
              console.error("iTunes API fetch error:", e);
              setAppState('SPEAKING');
              const failMsg = languageRef.current === 'zh-HK' ? "点歌系统网络出咗啲问题，一阵再试下啦。" : "点歌系统网络出了点问题，稍后再试下吧。";
              addMessage('assistant', failMsg, aiPersonaRef.current);
              speakText(failMsg, resumeListening);
            }
          };

          const handleUserCommandFinished = async (userText) => {
            clearTimeout(silenceTimerRef.current);
            clearTimeout(autoSleepTimerRef.current);
            setAppState('PROCESSING');
            addMessage('user', userText, null);
            
            setSystemMessage(`${getAiName(aiPersonaRef.current)} 正在思考怎么回复你...`);
            let responseText = await callAI(userText);
            
            // 修复正则：兼顾了全角中文冒号和半角英文冒号的识别
            const musicMatch = responseText.match(/\[MUSIC[:：]\s*(.*?)\s*\]\s*([\s\S]*)/i);
            let songQuery = null;
            let aiSpeechText = responseText;
            
            if (musicMatch) {
              songQuery = musicMatch[1].trim();
              aiSpeechText = musicMatch[2].trim() || (languageRef.current === 'zh-HK' ? "為你播放呢首歌" : "为你播放这首歌");
              responseText = aiSpeechText; 
            }
            
            setAppState('SPEAKING');
            setSystemMessage(`${getAiName(aiPersonaRef.current)} 正在说话...`);
            addMessage('assistant', responseText, aiPersonaRef.current);
            
            speakText(aiSpeechText, () => {
              if (songQuery) {
                playSong(songQuery);
              } else {
                resumeListening();
              }
            });
          };

          const callAI = async (newText) => {
            const activePersona = aiPersonaRef.current;
            let personaPrompt = "";
            
            const isCantonese = languageRef.current === 'zh-HK';
            const langReq = isCantonese ? "必须全部使用纯正的【地道粤语大白话】（带粤语字如：咁、咗、啲、嬲等）" : "必须使用自然亲切的【普通话口语】";

            switch (activePersona) {
              case 'junior': personaPrompt = `你是一个共情能力极强、说话温和、嘴甜乖巧且非常幽默的知心晚辈。\n沟通技巧：${langReq}。先强烈共情用户的委屈，情绪平复后再用幽默接地气的话帮另一半讲点好话。`; break;
              case 'cat': personaPrompt = `你是一只懂人话、成精的宠物猫“阿咪”。\n沟通技巧：${langReq}。先共情主人的委屈，再用猫咪的搞笑逻辑（比如帮你咬他等）来软化情绪。`; break;
              case 'priest': personaPrompt = `你是一位神父。\n沟通技巧：${langReq}。先共情对方痛苦，然后讲解圣经道理引导宽恕。`; break;
              case 'master': personaPrompt = `你是一位佛家高僧。\n沟通技巧：${langReq}。用佛家道理（放下执念、随缘）劝导看开。`; break;
              case 'confucius': personaPrompt = `你是一位儒家学者。\n沟通技巧：${langReq}。用儒家的通俗道理（家和万事兴）劝解。`; break;
              case 'laozi': personaPrompt = `你是一位道家高人。\n沟通技巧：${langReq}。用道家哲学（顺其自然、凡事不要太计较）劝解。`; break;
            }

            const systemInstruction = `你是一个AI家庭语音调解助手。\n【你的角色设定】\n${personaPrompt}\n\n用户的语音输入可能会有错别字，尽量理解意图。\n【核心要求】\n1. 遵守人设和语言！\n2. 每次回复 80-150字。必须极其口语化。\n3. 绝对不要包含动作提示符号（如【微笑】），只输出纯文本。\n4. 【重要点歌指令】：如果用户明确要求“点歌”、“放歌”、“听歌”（如：我想听xxx），你必须回复且只能回复：\`[MUSIC:歌曲名 歌手名] 简短的一句话介绍\`。例如：\`[MUSIC:七里香 周杰伦] 没问题，听首七里香放松一下吧。\`。只要是点歌，绝对不要讲废话，只能简单一两句话！否则正常回复纯文本。`;

            try {
              if (aiProviderRef.current === 'deepseek') {
                const messagesPayload = [
                  { role: 'system', content: systemInstruction },
                  ...messages.map(m => ({ role: m.role === 'assistant' ? 'assistant' : 'user', content: m.text })),
                  { role: 'user', content: newText }
                ];

                const response = await fetch(SILICON_FLOW_URL, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SILICON_FLOW_API_KEY}` },
                  body: JSON.stringify({ model: 'deepseek-ai/DeepSeek-V3.2', messages: messagesPayload, temperature: 0.7, max_tokens: 300 })
                });

                const data = await response.json();
                return data.choices?.[0]?.message?.content || "唔好意思，DeepSeek 脑短路了，再讲一次啦？";
              } else {
                const contents = messages.map(m => ({ role: m.role === 'assistant' ? 'model' : 'user', parts: [{ text: m.text }] }));
                contents.push({ role: 'user', parts: [{ text: newText }] });

                const activeApiKey = customGeminiKeyRef.current || apiKey;
                const geminiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${activeApiKey}`;

                const response = await fetch(geminiUrl, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ contents, systemInstruction: { parts: [{ text: systemInstruction }] } })
                });

                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "不好意思，我刚刚走神了，你能再说一遍吗？";
              }
            } catch (error) {
              return languageRef.current === 'zh-HK' ? "哎呀，调解室网络唔系几好，一阵再讲啦。" : "哎呀，调解室网络不太好，稍后再说吧。";
            }
          };

          const speakText = (text, onEndCallback) => {
            if (synth.speaking) synth.cancel();
            
            setTimeout(() => {
              const utterance = new SpeechSynthesisUtterance(text);
              utteranceRef.current = utterance; 
              
              const voices = synth.getVoices();
              let bestVoice = null;

              if (languageRef.current === 'zh-HK') {
                bestVoice = voices.find(v => v.lang === 'zh-HK' && (v.name.includes('Premium') || v.name.includes('Enhanced'))) ||
                            voices.find(v => v.lang === 'zh-HK' && v.name.includes('Siri'));
                if (!bestVoice) bestVoice = voices.find(v => v.lang === 'zh-HK' || v.lang.toLowerCase().includes('yue'));
              } else {
                bestVoice = voices.find(v => v.lang === 'zh-CN' && (v.name.includes('Premium') || v.name.includes('Enhanced'))) ||
                            voices.find(v => v.lang === 'zh-CN' && v.name.includes('Siri'));
                if (!bestVoice) bestVoice = voices.find(v => v.lang === 'zh-CN');
              }

              if (bestVoice) utterance.voice = bestVoice;
              utterance.rate = languageRef.current === 'zh-HK' ? 1.0 : 1.05;
              
              utterance.onend = () => { if (onEndCallback) onEndCallback(); utteranceRef.current = null; };
              utterance.onerror = (e) => { if (onEndCallback) onEndCallback(); utteranceRef.current = null; };

              synth.speak(utterance);
            }, 50);
          };

          const toggleSystem = () => {
            initAudioContext(); // 用户点击时解锁音频
            if (appState === 'IDLE') {
              startSystem();
            } else {
              setAppState('IDLE');
              setSystemMessage('系统已关闭，点击麦克风重新开启');
              synth.cancel();
              setTranscript('');
              clearTimeout(autoSleepTimerRef.current);
              clearTimeout(silenceTimerRef.current);
              
              if (audioRef.current) {
                audioRef.current.pause();
                audioRef.current.currentTime = 0;
              }
              setCurrentSong(null);
            }
          };

          const addMessage = (role, text, persona) => {
            setMessages(prev => [...prev, { role, text, persona, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) }]);
          };

          const getAiEmoji = (persona) => {
            switch(persona) {
              case 'junior': return '🧒';
              case 'cat': return '🐱';
              case 'priest': return '⛪';
              case 'master': return '📿';
              case 'confucius': return '📜';
              case 'laozi': return '☯️';
              default: return '🤖';
            }
          };

          const getAiName = (persona) => {
            switch(persona) {
              case 'junior': return '贴心晚辈';
              case 'cat': return '阿咪';
              case 'priest': return '神父';
              case 'master': return '永信大师';
              case 'confucius': return '孔老二';
              case 'laozi': return '老子';
              default: return AVATAR_OPTIONS.find(a => a.id === activeAvatarId)?.name || 'AI';
            }
          };

          const getStateColor = () => {
            switch(appState) {
              case 'WAKE_WORD': return 'bg-rose-400';
              case 'COMMAND': return 'bg-emerald-500';
              case 'PROCESSING': return 'bg-purple-500';
              case 'SPEAKING': return 'bg-amber-500';
              case 'PLAYING_SONG': return 'bg-sky-500';
              default: return 'bg-stone-300';
            }
          };

          const getStateIcon = () => {
            switch(appState) {
              case 'WAKE_WORD': return <Mic size={36} className="text-white" />;
              case 'COMMAND': return <Activity size={36} className="text-white animate-bounce" />;
              case 'PROCESSING': return <Loader2 size={36} className="text-white animate-spin" />;
              case 'SPEAKING': return <Volume2 size={36} className="text-white animate-pulse" />;
              case 'PLAYING_SONG': return <Music size={36} className="text-white animate-bounce" />;
              default: return <MicOff size={36} className="text-stone-500" />;
            }
          };

          const ActiveAvatarComponent = AVATAR_OPTIONS.find(a => a.id === activeAvatarId)?.component || DoraemonAvatar;

          // 处理拖拽滚动逻辑
          const handleMouseDown = (e) => {
            dragRef.current.isDragging = true;
            dragRef.current.startX = e.pageX - avatarScrollRef.current.offsetLeft;
            dragRef.current.scrollLeft = avatarScrollRef.current.scrollLeft;
            dragRef.current.dragDistance = 0;
          };

          const handleMouseLeave = () => { dragRef.current.isDragging = false; };
          const handleMouseUp = () => { dragRef.current.isDragging = false; };

          const handleMouseMove = (e) => {
            if (!dragRef.current.isDragging) return;
            e.preventDefault();
            const x = e.pageX - avatarScrollRef.current.offsetLeft;
            const walk = (x - dragRef.current.startX);
            avatarScrollRef.current.scrollLeft = dragRef.current.scrollLeft - walk;
            dragRef.current.dragDistance += Math.abs(e.movementX);
          };

          const handleAvatarClick = (e, id, name) => {
            if (dragRef.current.dragDistance > 5) {
              e.preventDefault();
              e.stopPropagation();
              return;
            }
            setActiveAvatarId(id);
            if (appState !== 'IDLE') setSystemMessage(`已切换为 ${name} 头像`);
          };

          return (
            <>
              <style>{`
                @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
                @keyframes slide-in-from-bottom-2 { from { transform: translateY(0.5rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
                @keyframes slide-in-from-top-1 { from { transform: translateY(-0.25rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
                @keyframes zoom-in-95 { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
                
                /* 听歌时的新增“摇头晃脑”动画 */
                @keyframes sway {
                  0%, 100% { transform: rotate(-8deg) scale(1.02); }
                  50% { transform: rotate(8deg) scale(1.02); }
                }
                .animate-sway { animation: sway 1.5s ease-in-out infinite; }

                .animate-in { animation-duration: 300ms; animation-fill-mode: both; animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
                .fade-in { animation-name: fade-in; }
                .slide-in-from-bottom-2 { animation-name: slide-in-from-bottom-2; }
                .slide-in-from-top-1 { animation-name: slide-in-from-top-1; }
                .zoom-in-95 { animation-name: zoom-in-95; }
                
                .no-scrollbar::-webkit-scrollbar { display: none; }
                .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
                
                ::-webkit-scrollbar { width: 6px; }
                ::-webkit-scrollbar-track { background: transparent; }
                ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
                ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
              `}</style>
              
              <audio ref={audioRef} onEnded={() => { setCurrentSong(null); resumeListening(); }} className="hidden" />

              <div className="min-h-screen flex flex-col items-center p-0 sm:p-4 font-sans text-stone-800 relative">
                <div className="w-full max-w-2xl bg-white sm:rounded-3xl shadow-xl overflow-hidden flex flex-col h-[100vh] sm:h-[90vh] border border-rose-100">
                  
                  {/* Header */}
                  <div className="bg-rose-500 p-4 text-white text-center relative z-20 shadow-sm flex items-center justify-between">
                    <HeartHandshake className="w-6 h-6 text-rose-100 opacity-0" />
                    <h1 className="text-xl font-bold tracking-wide flex items-center gap-2">
                      <HeartHandshake className="w-6 h-6 text-rose-100" />
                      AI 语音解忧室
                    </h1>
                    <button onClick={() => setShowSettings(true)} className="p-2 hover:bg-rose-600 rounded-full transition-colors active:scale-95">
                      <Settings className="w-5 h-5 text-rose-100" />
                    </button>
                  </div>

                  {/* Config Panel */}
                  <div className="bg-stone-50 border-b border-stone-200 px-4 py-3 flex flex-wrap gap-4 justify-between items-center text-sm shadow-sm z-20">
                    <div className="flex items-center gap-2 text-stone-600">
                      <Globe size={16} className="text-rose-400" />
                      <select value={language} onChange={(e) => setLanguage(e.target.value)} className="bg-white border border-stone-200 rounded px-2 py-1 focus:outline-none focus:border-rose-400 font-medium">
                        <option value="zh-HK">粤语 (Cantonese)</option>
                        <option value="zh-CN">普通话 (Mandarin)</option>
                      </select>
                    </div>
                    <button onClick={() => setAutoSleep(!autoSleep)} className={`flex items-center gap-2 px-3 py-1 rounded-full transition-colors border ${autoSleep ? 'bg-blue-50 border-blue-200 text-blue-600' : 'bg-stone-100 border-stone-200 text-stone-500'}`}>
                      <Moon size={14} />
                      <span className="text-xs font-semibold">自动休眠 {autoSleep ? '开' : '关'}</span>
                    </button>
                  </div>

                  {/* AI Persona Switcher */}
                  <div className="bg-white border-b border-stone-100 px-2 py-3 flex flex-wrap gap-2 justify-center shadow-sm z-20 relative">
                    {['junior', 'cat', 'priest', 'master', 'confucius', 'laozi'].map((persona) => (
                      <button 
                        key={persona}
                        onClick={() => {
                          setAiPersona(persona);
                          if (appState !== 'IDLE') setSystemMessage(`已切换为 ${getAiName(persona)}。您可以继续说话。`);
                        }}
                        className={`px-3 py-1.5 rounded-full text-xs font-medium transition-all border ${aiPersona === persona ? 'bg-rose-100 text-rose-700 border-rose-300 shadow-sm scale-105' : 'bg-stone-50 text-stone-600 border-stone-200 hover:bg-stone-100'}`}
                      >
                        {getAiEmoji(persona)} {getAiName(persona)}
                      </button>
                    ))}
                  </div>

                  {/* === Main View Area (分离式布局，解决头像滚动消失问题) === */}
                  <div className="flex flex-col flex-1 min-h-0 bg-stone-50/30">
                    
                    {/* 上半部分：固定不动的 Avatar & Avatar Switcher Area */}
                    <div className="flex flex-col items-center justify-center pt-6 pb-2 shrink-0 relative z-10 transition-all border-b border-stone-200 bg-white shadow-sm">
                      
                      {/* 头像容器：播放音乐时应用动画 */}
                      <div className={`transition-all duration-300 ${appState === 'PLAYING_SONG' ? 'animate-sway drop-shadow-2xl' : ''}`}>
                        <ActiveAvatarComponent isSpeaking={appState === 'SPEAKING'} isPlayingSong={appState === 'PLAYING_SONG'} />
                      </div>
                      
                      <div 
                        ref={avatarScrollRef}
                        onMouseDown={handleMouseDown}
                        onMouseLeave={handleMouseLeave}
                        onMouseUp={handleMouseUp}
                        onMouseMove={handleMouseMove}
                        className="flex gap-2 mt-4 overflow-x-auto w-full px-4 justify-start no-scrollbar pb-2 cursor-grab active:cursor-grabbing"
                        style={{ WebkitOverflowScrolling: 'touch' }}
                      >
                        {AVATAR_OPTIONS.map(a => (
                          <button
                            key={a.id}
                            onClick={(e) => handleAvatarClick(e, a.id, a.name)}
                            className={`shrink-0 px-4 py-1.5 rounded-full text-[13px] font-bold transition-all border shadow-sm ${
                              activeAvatarId === a.id 
                                ? 'bg-amber-100 text-amber-700 border-amber-300 scale-105' 
                                : 'bg-white text-stone-500 border-stone-200 hover:bg-stone-50'
                            }`}
                          >
                            {a.name}
                          </button>
                        ))}
                      </div>

                      {/* 音乐播放状态指示器 */}
                      {currentSong && appState === 'PLAYING_SONG' && (
                        <div className="mt-1 mb-2 flex items-center gap-3 bg-white p-2 pr-5 rounded-full shadow border border-stone-100 animate-in slide-in-from-bottom-2">
                          <img src={currentSong.cover} className="w-10 h-10 rounded-full animate-spin [animation-duration:4s]" alt="Album Cover" />
                          <div className="flex flex-col text-sm max-w-[150px]">
                            <span className="font-bold text-stone-800 truncate">{currentSong.title}</span>
                            <span className="text-xs text-stone-500 truncate">{currentSong.artist}</span>
                          </div>
                          <Music className="w-4 h-4 text-sky-500 animate-pulse ml-2" />
                        </div>
                      )}
                    </div>

                    {/* 下半部分：Scrollable Chat Messages */}
                    <div className="flex-1 p-4 sm:p-6 space-y-6 overflow-y-auto">
                      {messages.length === 0 && appState === 'IDLE' && (
                        <div className="flex flex-col items-center justify-center text-center space-y-4 opacity-70 mt-4">
                          <p className="text-stone-500 font-medium">点击下方麦克风开启系统</p>
                          <p className="text-stone-400 text-sm max-w-xs">当前使用：{aiProvider === 'gemini' ? 'Gemini 3 Flash' : 'DeepSeek V3'}</p>
                        </div>
                      )}

                      {messages.map((msg, idx) => {
                        const isAi = msg.role === 'assistant';
                        return (
                          <div key={idx} className={`flex ${isAi ? 'justify-start' : 'justify-end'} animate-in fade-in slide-in-from-bottom-2`}>
                            <div className={`flex max-w-[90%] sm:max-w-[80%] gap-3 ${isAi ? 'flex-row' : 'flex-row-reverse'}`}>
                              <div className={`w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0 shadow-sm mt-1 text-xl border ${isAi ? 'bg-white border-stone-200' : 'bg-blue-100 text-blue-700 border-blue-200'}`}>
                                {isAi ? getAiEmoji(msg.persona) : '👤'}
                              </div>
                              <div className="flex flex-col items-start gap-1">
                                <div className="text-[10px] text-stone-400 px-1 flex gap-2 w-full justify-between">
                                  <span>{isAi ? getAiName(msg.persona) : '你'}</span>
                                  <span>{msg.time}</span>
                                </div>
                                <div className={`p-3 sm:p-4 rounded-2xl shadow-sm text-[15px] leading-relaxed relative ${isAi ? 'bg-white border border-stone-200 text-stone-800 rounded-tl-none' : 'bg-blue-500 text-white rounded-tr-none border border-blue-600'}`}>
                                  {msg.text}
                                </div>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                      <div ref={messagesEndRef} />
                    </div>
                  </div>

                  {/* Bottom Control Area */}
                  <div className="p-4 bg-white border-t border-stone-200 flex flex-col items-center gap-3 relative z-20">
                    <div className="text-sm font-medium text-stone-500 text-center min-h-[20px]">{systemMessage}</div>

                    <div className="w-full max-w-sm transition-opacity duration-300 absolute -top-14" style={{ opacity: (appState === 'COMMAND' || appState === 'WAKE_WORD') ? 1 : 0, pointerEvents: 'none' }}>
                      <div className="bg-stone-800/80 backdrop-blur-sm rounded-xl p-3 text-white text-center text-sm shadow-lg truncate mx-4">
                        {transcript || <span className="opacity-50 tracking-widest">...</span>}
                      </div>
                    </div>

                    {/* 文字输入框作为 iOS App 环境的后备方案 */}
                    <div className="w-full flex gap-2 items-center mb-1">
                      <input 
                        type="text" 
                        value={inputText}
                        onChange={(e) => setInputText(e.target.value)}
                        onKeyDown={(e) => {
                          if (e.key === 'Enter' && inputText.trim()) {
                            initAudioContext(); // 用户点击时解锁音频
                            handleUserCommandFinished(inputText.trim());
                            setInputText('');
                          }
                        }}
                        placeholder={isSpeechSupported ? "不想说话？可以直接打字..." : "语音在此App不可用，请在此打字..."}
                        className="flex-1 bg-stone-50 border border-stone-200 rounded-full px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-rose-200 focus:border-rose-400 transition-all shadow-inner"
                      />
                      <button 
                        onClick={() => {
                          initAudioContext(); // 用户点击时解锁音频
                          if (inputText.trim()) {
                            handleUserCommandFinished(inputText.trim());
                            setInputText('');
                          }
                        }}
                        disabled={!inputText.trim() || appState === 'PROCESSING'}
                        className="bg-rose-500 text-white rounded-full px-4 py-2 text-sm font-bold shadow-md disabled:opacity-50 disabled:bg-stone-300 transition-all active:scale-95 whitespace-nowrap"
                      >
                        发送
                      </button>
                    </div>

                    <div className="relative flex justify-center items-center h-24 w-full">
                      {appState !== 'IDLE' && <div className={`absolute w-20 h-20 rounded-full ${getStateColor()} opacity-20 animate-ping`}></div>}
                      {(appState === 'COMMAND' || appState === 'SPEAKING' || appState === 'PLAYING_SONG') && <div className={`absolute w-16 h-16 rounded-full ${getStateColor()} opacity-30 animate-pulse delay-75`}></div>}
                      
                      <button onClick={toggleSystem} className={`relative z-10 w-16 h-16 rounded-full flex items-center justify-center transition-all duration-300 shadow-lg hover:scale-105 ${getStateColor()}`} title={appState === 'IDLE' ? "开启解忧室" : "关闭系统"}>
                        {getStateIcon()}
                      </button>
                    </div>
                  </div>
                </div>

                {/* --- Settings Modal --- */}
                {showSettings && (
                  <div className="absolute inset-0 z-50 flex items-center justify-center p-4 bg-stone-900/40 backdrop-blur-sm animate-in fade-in">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden animate-in zoom-in-95">
                      <div className="flex justify-between items-center p-4 border-b border-stone-100">
                        <h2 className="font-bold text-lg text-stone-800 flex items-center gap-2"><Settings className="w-5 h-5 text-rose-500" />系统设置</h2>
                        <button onClick={() => setShowSettings(false)} className="p-1 rounded-full hover:bg-stone-100 text-stone-500"><X className="w-5 h-5" /></button>
                      </div>
                      <div className="p-5 space-y-6">
                        <div className="space-y-3">
                          <label className="text-sm font-semibold text-stone-700 block">AI 模型选择</label>
                          <div className="grid grid-cols-2 gap-2">
                            <button onClick={() => setAiProvider('gemini')} className={`py-2 px-3 rounded-xl border text-sm font-medium transition-all ${aiProvider === 'gemini' ? 'bg-blue-50 border-blue-400 text-blue-700 shadow-sm' : 'bg-white border-stone-200 text-stone-500 hover:bg-stone-50'}`}>Gemini 3 Flash</button>
                            <button onClick={() => setAiProvider('deepseek')} className={`py-2 px-3 rounded-xl border text-sm font-medium transition-all ${aiProvider === 'deepseek' ? 'bg-emerald-50 border-emerald-400 text-emerald-700 shadow-sm' : 'bg-white border-stone-200 text-stone-500 hover:bg-stone-50'}`}>DeepSeek V3</button>
                          </div>
                        </div>
                        {aiProvider === 'gemini' && (
                          <div className="space-y-2 animate-in fade-in slide-in-from-top-1">
                            <label className="text-sm font-semibold text-stone-700 block">自定义 Gemini API Key</label>
                            <input type="password" placeholder="选填 (留空则使用内置体验Key)" value={customGeminiKey} onChange={(e) => setCustomGeminiKey(e.target.value)} className="w-full border border-stone-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all"/>
                            <p className="text-[10px] text-stone-400 leading-tight">如果频繁报错网络问题，请尝试输入您自己的 Gemini API Key 突破限制。</p>
                          </div>
                        )}
                        {aiProvider === 'deepseek' && (
                          <div className="space-y-2 bg-emerald-50/50 p-3 rounded-xl border border-emerald-100 animate-in fade-in slide-in-from-top-1">
                            <p className="text-sm font-medium text-emerald-800">已内置 Silicon Flow API</p>
                            <p className="text-xs text-emerald-600/80 break-all font-mono">Model: deepseek-ai/DeepSeek-V3.2</p>
                            <p className="text-[10px] text-emerald-500 mt-2">✨ 代码已硬编码内置你的密钥，无需额外填写。</p>
                          </div>
                        )}
                      </div>
                      <div className="p-4 bg-stone-50 border-t border-stone-100 flex justify-end">
                        <button onClick={() => setShowSettings(false)} className="px-5 py-2 bg-rose-500 hover:bg-rose-600 text-white rounded-xl text-sm font-bold shadow-sm transition-colors active:scale-95">保存并关闭</button>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
